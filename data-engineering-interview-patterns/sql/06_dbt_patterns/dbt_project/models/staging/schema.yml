version: 2

models:
  - name: stg_orders
    description: "Cleaned and typed orders from raw source"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'pending', 'cancelled']
      - name: line_total
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned and typed customers from raw source"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null

  - name: stg_events
    description: "Cleaned, typed and deduplicated events"
    columns:
      - name: event_id
        description: "Primary key (unique after dedup)"
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
